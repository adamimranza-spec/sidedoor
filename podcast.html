<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listen to the Podcast</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .episode-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-spotify {
      background: #1DB954;
      color: #000;
    }

    .btn-apple {
      background: #fc3c44;
      color: #fff;
    }

    .btn svg {
      flex-shrink: 0;
    }

    .divider {
      font-size: 0.8rem;
      color: #555;
      margin: 0.25rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="episode-label">Now Playing</p>
    <h1>Stop Cold Emailing Everyone</h1>
    <p class="subtitle">ft. Imran Adam</p>

    <div class="buttons">
      <a class="btn btn-spotify" href="https://open.spotify.com/episode/7fZaTEV4ZLNAHtDKds1cZ4" target="_blank" rel="noopener">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">

        </svg>
        Listen on Spotify

      <p class="divider">or</p>

        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">

    </div>
  </div>
</body>
</html>
